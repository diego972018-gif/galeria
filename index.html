<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial;
    text-align: center;
}

h2 {
    margin: 20px 0;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
    padding: 10px;
}

.galeria img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 10px;
}

/* VISOR */
#visor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#visor img {
    max-width: 100%;
    max-height: 80%;
}

.boton {
    margin-top: 20px;
    padding: 12px;
    background: #00c853;
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 16px;
}
</style>

<script>
let imagenActual = "";

function abrirImagen(url) {
    imagenActual = url;
    document.getElementById("visorImg").src = url;
    document.getElementById("visor").style.display = "flex";
}

function usarFondo() {
    window.location.href = "app://setwallpaper?img=" + imagenActual;
}

function cerrarVisor() {
    document.getElementById("visor").style.display = "none";
}
</script>

</head>

<body>

<h2>Galería de Fondos</h2>

<div class="galeria">
