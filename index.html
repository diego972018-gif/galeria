<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Fondos</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
    user-select: none;
}

h1 {
    padding: 20px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 12px;
}

.card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    cursor: pointer;
}

/* VISOR */
#visor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#visor img {
    max-width: 90%;
    max-height: 70%;
}

/* BOTÓN */
.boton {
    margin-top: 20px;
    padding: 12px 20px;
    background: #00c853;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

/* FLECHAS */
#scrollTop, #scrollBottom {
    position: fixed;
    right: 10px;
    background: #00c853;
    padding: 10px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
}

#scrollTop { bottom: 70px; }
#scrollBottom { bottom: 20px; }
</style>
</head>

<body>

<h1>Galería de Fondos</h1>

<div class="galeria">

<script>
for (let i = 1; i <= 30; i++) {
    document.write(`
        <div class="card">
            <img src="fondos/fondo_${i}.jpg"
                 loading="lazy"
                 draggable="false"
                 oncontextmenu="return false"
                 onclick="abrirVisor(this.src)">
        </div>
    `);
}
</script>

</div>

<!-- VISOR -->
<div id="visor" onclick="cerrarVisor(event)">
    <img id="visorImg"
         draggable="false"
         oncontextmenu="return false"
         onclick="event.stopPropagation()">

    <div class="boton"
         onclick="event.stopPropagation(); usarFondo()">
        Usar como fondo
    </div>
</div>

<!-- FLECHAS -->
<div id="scrollTop" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️</div>
<div id="scrollBottom" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">⬇️</div>

<script>

let imagenActual = "";

function abrirVisor(src) {
    imagenActual = src;
    document.getElementById("visor").style.display = "flex";
    document.getElementById("visorImg").src = src;
}

function cerrarVisor(e) {
    if (e.target.id === "visor") {
        document.getElementById("visor").style.display = "none";
    }
}

function usarFondo() {
    window.location.href = "app://setwallpaper?img=" + imagenActual;
}

// 🔒 BLOQUEOS
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

document.addEventListener("touchstart", function(e) {
    if (e.target.tagName === "IMG") {
        e.preventDefault();
    }
}, { passive: false });

</script>

</body>
</html>
