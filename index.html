<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galería de Fondos</title>

<!-- ⚡ PRELOAD (portadas más rápidas) -->
<link rel="preload" as="image" href="fondos/naturaleza/fondo_1.jpg">
<link rel="preload" as="image" href="fondos/belleza/fondo_1.jpg">

<!-- ⚡ CACHE -->
<meta http-equiv="Cache-Control" content="public, max-age=31536000">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

h1 {
    margin: 10px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 12px;
}

.card {
    background: #1a1a1a;
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.2s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    cursor: pointer;
}

/* ⚡ BOTONES */
.boton {
    margin: 10px;
    padding: 10px 18px;
    background: #00c853;
    border-radius: 8px;
    display: inline-block;
    cursor: pointer;
}

/* 🔍 VISOR */
#visor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.96);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#visor img {
    max-width: 92%;
    max-height: 75%;
}
</style>
</head>

<body>

<h1 id="titulo">Categorías</h1>
<div id="volver" class="boton" style="display:none;" onclick="volver()">⬅ Volver</div>

<div class="galeria" id="contenedor"></div>

<!-- 🔍 VISOR -->
<div id="visor" onclick="cerrarVisor(event)">
    <img id="visorImg" onclick="event.stopPropagation()">
    <div class="boton" onclick="event.stopPropagation(); usarFondo()">Usar como fondo</div>
</div>

<script>
let imagenActual = "";

// 📱 DETECTAR APPS
const ua = navigator.userAgent;
const esApp = ua.includes("LECTOSCAN_APP") || ua.includes("TRADUVOZ_APP");

// 🔒 BLOQUEO SOLO WEB
if (!esApp) {
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("dragstart", e => e.preventDefault());
    document.addEventListener("selectstart", e => e.preventDefault());
}

// 📁 CATEGORÍAS
const categorias = {
    naturaleza: "Naturaleza",
    belleza: "Belleza",
    urbano: "Urbano",
    extremo: "Extremo",
    oriente_extremo: "Oriente Extremo"
};

// 🔍 PARAMETROS URL
const params = new URLSearchParams(window.location.search);
const cat = params.get("cat");

// 🚀 INICIO
if (cat) {
    cargarImagenes(cat);
} else {
    cargarCategorias();
}

// 🏠 MOSTRAR CATEGORÍAS
function cargarCategorias() {
    const cont = document.getElementById("contenedor");

    for (let c in categorias) {
        const portada = `fondos/${c}/fondo_1.jpg`;

        cont.innerHTML += `
            <div class="card">
                <img src="${portada}" 
                     loading="eager"
                     decoding="async"
                     onclick="abrirCategoria('${c}')">
                <p>${categorias[c]}</p>
            </div>
        `;
    }
}

// 📂 ABRIR CATEGORÍA
function abrirCategoria(c) {
    window.location.href = "?cat=" + c;
}

// 🔙 VOLVER
function volver() {
    window.location.href = window.location.pathname;
}

// 🖼️ CARGAR IMÁGENES (1–20)
function cargarImagenes(c) {

    document.getElementById("titulo").innerText = categorias[c];
    document.getElementById("volver").style.display = "inline-block";

    const cont = document.getElementById("contenedor");

    for (let i = 1; i <= 20; i++) {

        const ruta = `fondos/${c}/fondo_${i}.jpg`;

        cont.innerHTML += `
            <div class="card">
                <img src="${ruta}"
                     loading="lazy"
                     decoding="async"
                     onclick="abrirVisor('${ruta}')"
                     onerror="this.style.display='none'">
            </div>
        `;
    }
}

// 🔍 VISOR
function abrirVisor(src) {
    imagenActual = src;
    document.getElementById("visor").style.display = "flex";
    document.getElementById("visorImg").src = src;
}

function cerrarVisor(e) {
    if (e.target.id === "visor") {
        document.getElementById("visor").style.display = "none";
    }
}

// 📲 ENVIAR A APP
function usarFondo() {
    window.location.href = "app://setwallpaper?img=" + encodeURIComponent(imagenActual);
}
</script>

</body>
</html>
