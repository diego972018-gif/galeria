<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Fondos</title>

<!-- 🔥 Control de caché -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
    font-size: 22px;
}

/* Galería */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 12px;
}

/* Tarjeta */
.card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    padding-bottom: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* Imagen */
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.card img:hover {
    transform: scale(1.05);
}

/* Botón */
.boton {
    display: block;
    margin: 8px auto;
    width: 80%;
    padding: 8px;
    background: linear-gradient(45deg, #00c853, #00e676);
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
    transition: 0.3s;
}

.boton:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<h1>Galería de Fondos</h1>

<div class="galeria">

    <!-- IMÁGENES PNG -->

    <div class="card">
        <img src="fondos/fondo_1.png" loading="lazy">
        <a class="boton" href="fondos/fondo_1.png" download>Descargar</a>
    </div>

    <div class="card">
        <img src="fondos/fondo_2.png" loading="lazy">
        <a class="boton" href="fondos/fondo_2.png" download>Descargar</a>
