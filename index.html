<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Fondos</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 12px;
}

.card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    cursor: pointer;
}

#visor {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#visor img {
    max-width: 90%;
    max-height: 70%;
}

.boton {
    margin-top: 20px;
    padding: 12px 20px;
    background: #00c853;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Galería de Fondos</h1>

<div class="galeria">

<!-- 🔥 IMÁGENES HASTA 30 -->

<script>
for (let i = 1; i <= 30; i++) {
    document.write(`
        <div class="card">
            <img src="fondos/fondo_${i}.jpg" loading="lazy" onclick="abrirVisor(this.src)">
        </div>
    `);
}
</script>

</div>

<!-- 🔥 VISOR -->

<div id="visor" onclick="cerrarVisor(event)">
    <img id="visorImg" onclick="event.stopPropagation()">
    <div class="boton" onclick="event.stopPropagation(); usarFondo()">Usar como fondo</div>
</div>

<script>

let imagenActual = "";

function abrirVisor(src) {
    imagenActual = src;
    document.getElementById("visor").style.display = "flex";
    document.getElementById("visorImg").src = src;
}

function cerrarVisor(e) {
    if (e.target.id === "visor") {
        document.getElementById("visor").style.display = "none";
    }
}

function usarFondo() {
    window.location.href = "app://setwallpaper?img=" + imagenActual;
}

</script>

</body>
</html>
